<!DOCTYPE html>
<html>
<head>
    <title>SentraRisk</title>

    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 20px auto;
        padding: 20px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
    }

    #result {
        margin-top: 20px;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }

    .low {
        color: green;
    }

    .medium {
        color: orange;
    }

    .high {
        color: red;
    }
</style>
</head>

<body>

<h1>SentraRisk Assessment</h1>

<label>
    <input type="checkbox" id="https">
    Uses HTTPS
</label>
<br>

<label>
    <input type="checkbox" id="backup">
    Has Backup
</label>
<br>

<label>
    <input type="checkbox" id="plugins">
    Uses Outdated Plugins
</label>
<br>

<label>
    <input type="checkbox" id="admin">
    Uses Default Admin User
</label>
<br>

<label>
    <input type="checkbox" id="twofa">
    Uses Two-Factor Authentication
</label>

<br><br>

<button onclick="calculateRisk()">
    Analyze
</button>

<hr>

<div id="result"></div>

<script src="app.js"></script>

</body>
</html>
